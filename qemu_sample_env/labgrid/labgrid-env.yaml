targets:
  main:
    drivers:
      QEMUDriver:
        qemu_bin: 'qemu_aarch64'
        machine: 'virt'
        cpu: 'cortex-a57'
        memory: '512M'
        display: 'none'
        kernel: 'kernel'
        dtb: 'dtb'
        extra_args: '-initrd /home/lion/workdir/sourcecode/quantum_main/src/packages/qemu_sample_env/rootfs.cpio'
        boot_args: 'console=ttyAMA0 init=/init nokaslr earlycon=pl011,0x9000000 debug loglevel=8'
      ShellDriver:
        prompt: '[#\$] '
        login_prompt: ' login: '
        username: 'root'
        await_login_timeout: 30
        login_timeout: 120
      ShellStrategy: {}

tools:
  qemu_aarch64: 'qemu-system-aarch64'

images:
  kernel: '/home/lion/workdir/sourcecode/quantum_main/out/quantum_qemu_debug/build/linux-6.1/arch/arm64/boot/Image'
  dtb: '/home/lion/workdir/sourcecode/quantum_main/src/packages/qemu_sample_env/quantum_qemu.dtb'
